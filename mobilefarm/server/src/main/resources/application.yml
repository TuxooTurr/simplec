spring:
  application:
    name: mobile-farm-hub

  datasource:
    url: jdbc:postgresql://localhost:5432/mobilefarm
    username: farm
    password: changeme
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

farm:
  session:
    default-timeout-min: 30
    max-sessions-per-user: 3
  agent:
    health-check-interval-sec: 10
  grid:
    port: 4444
    session-timeout-sec: 1800

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

jwt:
  secret: ${JWT_SECRET:mobile-farm-dev-secret-key-change-in-production-minimum-32-bytes}
  expiration-ms: 86400000
